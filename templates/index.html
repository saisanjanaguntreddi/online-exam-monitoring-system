<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Online Examination</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;

            overflow:hidden;

            background:linear-gradient(135deg,#0f172a,#1e40af,#3b82f6);

        }

        body::before{

            content:"";

            position:absolute;

            width:650px;
            height:650px;

            background:rgba(255,255,255,.12);

            border-radius:50%;

            top:-180px;
            left:-180px;

            filter:blur(20px);

        }

        body::after{

            content:"";

            position:absolute;

            width:500px;
            height:500px;

            background:rgba(255,255,255,.10);

            border-radius:50%;

            bottom:-170px;
            right:-170px;

            filter:blur(20px);

        }

        .card{

            position:relative;

            width:520px;

            background:rgba(255,255,255,.16);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.25);

            border-radius:22px;

            padding:45px;

            text-align:center;

            box-shadow:0 20px 50px rgba(0,0,0,.35);

            animation:fadeUp .9s ease;

        }

        @keyframes fadeUp{

            from{

                opacity:0;
                transform:translateY(35px);

            }

            to{

                opacity:1;
                transform:translateY(0);

            }

        }

        .logo{

            width:95px;
            height:95px;

            margin:auto;

            border-radius:50%;

            background:white;

            display:flex;

            justify-content:center;
            align-items:center;

            font-size:42px;

            margin-bottom:25px;

            box-shadow:0 8px 25px rgba(0,0,0,.25);

        }

        h1{

            color:white;

            font-size:34px;

            margin-bottom:10px;

            font-weight:700;

        }

        p{

            color:#edf4ff;

            font-size:16px;

            margin-bottom:35px;

        }

        .btn{

            width:100%;

            padding:16px;

            margin-top:18px;

            border:none;

            border-radius:12px;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:.35s;

        }

        .register{

            background:white;

            color:#2563eb;

        }

        .register:hover{

            transform:translateY(-4px);

            box-shadow:0 12px 28px rgba(255,255,255,.25);

        }

        .login{

            background:#2563eb;

            color:white;

        }

        .login:hover{

            background:#1d4ed8;

            transform:translateY(-4px);

            box-shadow:0 12px 28px rgba(0,0,0,.30);

        }

        .bottom{

            margin-top:30px;

            color:white;

            font-size:14px;

            opacity:.9;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="logo">

        🎓

    </div>

    <h1>Online Examination</h1>

    <p>Welcome</p>

    <a href="/register">

        <button class="btn register">

            Candidate Registration

        </button>

    </a>

    <a href="/login">

        <button class="btn login">

            Candidate Login

        </button>

    </a>

    <div class="bottom">

        Secure • Simple • Reliable

    </div>

</div>

</body>

</html>
