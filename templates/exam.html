<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exam Instructions</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,Arial,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f172a,#1e40af,#3b82f6);

}

.container{

width:800px;

background:white;

padding:40px;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,.30);

}

h1{

text-align:center;

color:#1e3a8a;

margin-bottom:30px;

}

ul{

margin-left:25px;

margin-bottom:35px;

}

li{

margin-bottom:15px;

font-size:18px;

}

button{

width:100%;

padding:16px;

font-size:18px;

background:#16a34a;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}

button:hover{

background:#15803d;

}

</style>

</head>

<body>

<div class="container">

<h1>Exam Instructions</h1>

<ul>

<li>Keep your webcam ON throughout the examination.</li>

<li>Do not switch browser tabs.</li>

<li>No mobile phones are allowed.</li>

<li>Only one candidate should be visible.</li>

<li>Click Start Exam when you are ready.</li>

</ul>

<button onclick="window.location.href='/start_exam'">

Start Exam

</button>

</div>

</body>

</html>
