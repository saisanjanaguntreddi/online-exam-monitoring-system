<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Successful</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:linear-gradient(135deg,#0f172a,#2563eb);

            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;

        }

        .container{

            width:500px;

            background:white;

            padding:40px;

            border-radius:15px;

            text-align:center;

            box-shadow:0 10px 25px rgba(0,0,0,0.25);

        }

        .icon{

            font-size:65px;

            margin-bottom:15px;

        }

        h1{

            color:#16a34a;

            margin-bottom:15px;

        }

        h2{

            color:#1e3a8a;

            margin-bottom:15px;

        }

        .candidate{

            background:#eef4ff;

            padding:15px;

            border-radius:8px;

            margin:20px 0;

        }

        .candidate p{

            margin:8px;

            color:#333;

            font-size:18px;

        }

        .message{

            color:#666;

            margin-bottom:25px;

            line-height:25px;

        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:8px;

            background:#2563eb;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;

        }

        button:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>

<div class="container">

<div class="icon">✅</div>

<h1>Login Successful</h1>

<h2>Welcome {{ candidate_name }}</h2>

<div class="candidate">

<p><strong>Candidate ID</strong></p>

<p>{{ candidate_id }}</p>

</div>

<p class="message">

Your identity has been verified successfully.<br>

Click the button below to continue.

</p>

<a href="/exam">

<button>

Proceed to Examination

</button>

</a>

</div>

</body>

</html>
