<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Candidate Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

            background:linear-gradient(135deg,#0f172a,#1e40af,#3b82f6);

        }

        body::before{

            content:"";

            position:absolute;

            width:600px;
            height:600px;

            background:rgba(255,255,255,.10);

            border-radius:50%;

            top:-180px;
            left:-180px;

            filter:blur(20px);

        }

        body::after{

            content:"";

            position:absolute;

            width:450px;
            height:450px;

            background:rgba(255,255,255,.08);

            border-radius:50%;

            bottom:-150px;
            right:-150px;

            filter:blur(20px);

        }

        .card{

            position:relative;

            width:470px;

            background:rgba(255,255,255,.16);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.25);

            border-radius:20px;

            padding:40px;

            box-shadow:0 20px 50px rgba(0,0,0,.35);

            animation:fade .8s ease;

        }

        @keyframes fade{

            from{

                opacity:0;
                transform:translateY(25px);

            }

            to{

                opacity:1;
                transform:translateY(0);

            }

        }

        h2{

            text-align:center;

            color:white;

            margin-bottom:30px;

            font-size:30px;

        }

        label{

            color:white;

            font-weight:500;

            display:block;

            margin-bottom:8px;

        }

        input{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            margin-bottom:20px;

            outline:none;

            font-size:15px;

            background:rgba(255,255,255,.95);

        }

        input:focus{

            box-shadow:0 0 0 3px rgba(255,255,255,.35);

        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:10px;

            background:white;

            color:#2563eb;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:0 10px 25px rgba(255,255,255,.30);

        }

        .bottom{

            text-align:center;

            margin-top:22px;

            color:white;

        }

        .bottom a{

            color:white;

            font-weight:600;

            text-decoration:none;

        }

        .bottom a:hover{

            text-decoration:underline;

        }

        .password-box{

            position:relative;

            margin-bottom:20px;

        }

        .password-box input{

            width:100%;

            padding-right:50px;

            margin-bottom:0;

        }

        .toggle{

            position:absolute;

            right:15px;

            top:50%;

            transform:translateY(-50%);

            cursor:pointer;

            font-size:20px;

            user-select:none;

        }

    </style>

</head>

<body>

<div class="card">

<h2>Candidate Login</h2>

<form method="POST">

<label>Candidate ID</label>

<input
type="number"
name="candidate_id"
placeholder="Enter Candidate ID"
required>

<label>Email Address</label>

<input
type="email"
name="email"
placeholder="Enter Email Address"
required>

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
name="password"
placeholder="Enter Password"
required>

<span class="toggle" onclick="togglePassword('password',this)">👁</span>

</div>

<button type="submit">

Login

</button>

</form>

<div class="bottom">

New Candidate?

<a href="/register">

Register Here

</a>

</div>

</div>

<script>

function togglePassword(id,icon){

    let input=document.getElementById(id);

    if(input.type==="password"){

        input.type="text";
        icon.innerHTML="🙈";

    }

    else{

        input.type="password";
        icon.innerHTML="👁";

    }

}

</script>

</body>

</html>
