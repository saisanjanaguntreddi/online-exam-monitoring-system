<!DOCTYPE html>
<html>

<head>
    <title>Candidate Login</title>
</head>

<body>

    <h2>Candidate Login</h2>

    <form method="POST">

        <input type="number" name="candidate_id" required><br><br>

        <label>Email</label><br>

        <button type="submit">
            Login
        </button>

    </form>

</body>

</html>
