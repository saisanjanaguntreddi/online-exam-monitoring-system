<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Online Examination</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,Arial,sans-serif;

}

body{

background:#eef2ff;

padding:40px;

}

.container{

width:850px;

margin:auto;

background:white;

padding:35px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.20);

}

.top{

display:flex;

justify-content:space-between;

margin-bottom:30px;

}

.box{

background:#2563eb;

color:white;

padding:12px 20px;

border-radius:8px;

font-weight:bold;

}

.question{

margin-top:20px;

}

.question h2{

margin-bottom:20px;

}

.option{

margin-bottom:15px;

font-size:18px;

}

.buttons{

display:flex;

justify-content:space-between;

margin-top:35px;

}

button{

padding:14px 30px;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

color:white;

}

.next{

background:#2563eb;

}

.submit{

background:#dc2626;

}

</style>

</head>

<body>

<div class="container">

<div class="top">

<div class="box">

Status :
Running

</div>

<div class="box">

Time Left :
<span id="timer">

30:00

</span>

</div>

</div>

<div class="question">

<h2>

Question 1

</h2>

<p>

Which language is used for Flask?

</p>

<br>

<div class="option">

<input type="radio" name="q1">

Python

</div>

<div class="option">

<input type="radio" name="q1">

Java

</div>

<div class="option">

<input type="radio" name="q1">

C++

</div>

<div class="option">

<input type="radio" name="q1">

PHP

</div>

</div>

<div class="buttons">

<button class="next">

Next

</button>

<button
class="submit"
onclick="submitExam()">

Submit Exam

</button>

</div>

</div>

<script>

let seconds=1800;

setInterval(function(){

seconds--;

let m=Math.floor(seconds/60);

let s=seconds%60;

if(m<10)m="0"+m;

if(s<10)s="0"+s;

document.getElementById("timer").innerHTML=m+":"+s;

},1000);

function submitExam(){

alert("Exam Submitted Successfully");

}

</script>

</body>

</html>
