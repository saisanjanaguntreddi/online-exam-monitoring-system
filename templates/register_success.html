<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Successful</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:linear-gradient(135deg,#0f172a,#2563eb);

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

        }

        .container{

            width:500px;

            background:white;

            padding:40px;

            border-radius:15px;

            text-align:center;

            box-shadow:0px 0px 20px rgba(0,0,0,0.25);

        }

        .icon{

            font-size:70px;

            margin-bottom:15px;

        }

        h1{

            color:#16a34a;

            margin-bottom:20px;

        }

        h2{

            color:#1e3a8a;

            margin-bottom:15px;

        }

        p{

            color:#555;

            font-size:17px;

            margin-bottom:10px;

        }

        .candidate{

            background:#eef4ff;

            padding:15px;

            border-radius:8px;

            margin:25px 0;

            color:#1e3a8a;

            font-size:20px;

            font-weight:bold;

        }

        button{

            width:100%;

            padding:15px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:8px;

            font-size:18px;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>

<div class="container">

    <div class="icon">✅</div>

    <h1>Registration Successful</h1>

    <h2>Welcome!</h2>

    <p>Your registration has been completed successfully.</p>

    <p>Please save your Candidate ID for login.</p>

    <div class="candidate">

        Candidate ID : {{ candidate_id }}

    </div>

    <a href="/login">

        <button>

            Proceed to Login

        </button>

    </a>

</div>

</body>

</html>
